name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build artifacts
        run: bash scripts/build-release.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/baseline_Darwin_arm64.tar.gz
            dist/baseline_Darwin_x86_64.tar.gz
            dist/baseline_Linux_arm64.tar.gz
            dist/baseline_Linux_x86_64.tar.gz
            dist/baseline-openclaw-plugin.tgz
            dist/baseline-codex-plugin.tgz
            dist/checksums.txt
